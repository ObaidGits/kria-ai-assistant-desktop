# ==========================================
# K.R.I.A. Default Configuration
# ==========================================
# Copy to ~/.kria/config.toml and customize.

[llm]
mode = "local"                              # "local" | "gemini" | "external"
# cloud_api_key = ""                        # Set via KRIA_CLOUD_API_KEY env var
local_host = "127.0.0.1"
local_port = 8080
max_context_tokens = 4096

[[llm.local_models]]
name = "phi-4-mini"
filename = "microsoft_Phi-4-mini-instruct-Q4_K_M.gguf"
context_size = 4096
gpu_layers = 99
tier = "low"

[voice]
enabled = false
mode = "push_to_talk"
stt_model = "ggml-base.en.bin"
tts_voice = "en_US-lessac-high"
vad_silence_ms = 1000
energy_threshold = 0.02
mic_device = "auto"
speaker_device = "auto"
push_to_talk_key = "ctrl+space"
language = "auto"
partial_update_ms = 2000
confidence_threshold = 0.30
noise_suppression_mode = "off"
follow_system_default_mic = true
follow_system_default_speaker = true
persist_transcripts = true
persist_raw_audio = false

[memory]
max_facts = 10000
decay_half_life_days = 7
prune_threshold = 0.01

[safety]
require_approval_for_red = true
audit_enabled = true
max_rollback_snapshots = 50
rollback_max_age_days = 30

[server]
host = "127.0.0.1"
port = 3001

[telegram]
enabled = false
bot_token = ""
allowed_chat_ids = ""
auto_start = true

[ui]
theme = "dark"
font_size = 14

[search]
engine = "duckduckgo"                       # "duckduckgo" | "searxng"
# searxng_url = "http://localhost:8888"     # Only used when engine = "searxng"
news_feeds = [
    "https://feeds.arstechnica.com/arstechnica/index",
    "https://hnrss.org/frontpage",
]

[hardware]
tier = ""                                   # "" = auto-detect; or lite|standard|performance|high
max_context_tokens = 0                       # 0 = tier default/clamp
gpu_layers = -1                              # -1 = tier default
threads = 0                                  # 0 = tier default

[agent]
autonomy_profile = "balanced"               # conservative | balanced | aggressive
min_confidence_to_act = 0.55
clarify_threshold = 0.40
require_plan_for_complex_tasks = true
require_evidence_for_completion = true
max_tool_rounds = 10

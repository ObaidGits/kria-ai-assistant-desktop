# ==========================================
# K.R.I.A. Default Configuration
# ==========================================
# Copy to ~/.kria/config.toml and customize.

[llm]
mode = "local"                              # "local" | "gemini" | "external"
# cloud_api_key = ""                        # Set via KRIA_CLOUD_API_KEY env var
local_host = "127.0.0.1"
local_port = 8080
max_context_tokens = 4096

[[llm.models]]
name = "qwen2.5-vl-7b"
file = "Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf"
display_name = "Qwen 2.5 VL 7B (Q4_K_M)"
context_window = 8192
max_tokens = 4096
vram_estimate_gb = 5.0
capabilities = ["chat", "vision"]
mmproj_file = "mmproj-F16.gguf"

[[llm.models]]
name = "phi-4-mini"
file = "microsoft_Phi-4-mini-instruct-Q4_K_M.gguf"
display_name = "Phi-4 Mini Instruct (Q4_K_M)"
context_window = 4096
max_tokens = 2048
vram_estimate_gb = 2.5
capabilities = ["chat"]

[voice]
enabled = false
mode = "push_to_talk"
stt_model = "ggml-base.en.bin"
tts_voice = "en_US-lessac-high"
vad_silence_ms = 1000
energy_threshold = 0.02
mic_device = "auto"
speaker_device = "auto"
push_to_talk_key = "ctrl+space"
language = "auto"
partial_update_ms = 2000
confidence_threshold = 0.30
noise_suppression_mode = "off"
follow_system_default_mic = true
follow_system_default_speaker = true
persist_transcripts = true
persist_raw_audio = false

[memory]
max_facts = 10000
decay_half_life_days = 7
prune_threshold = 0.01

[safety]
require_approval_for_red = true
audit_enabled = true
max_rollback_snapshots = 50
rollback_max_age_days = 30

[server]
host = "127.0.0.1"
port = 3001

[telegram]
enabled = false
bot_token = ""
allowed_chat_ids = ""
auto_start = true

[ui]
theme = "dark"
font_size = 14

[search]
engine = "duckduckgo"                       # "duckduckgo" | "searxng"
# searxng_url = "http://localhost:8888"     # Only used when engine = "searxng"
news_feeds = [
    "https://feeds.arstechnica.com/arstechnica/index",
    "https://hnrss.org/frontpage",
]

[hardware]
tier = ""                                   # "" = auto-detect; or lite|standard|performance|high
max_context_tokens = 0                       # 0 = tier default/clamp
gpu_layers = -1                              # -1 = tier default
threads = 0                                  # 0 = tier default

[agent]
autonomy_profile = "balanced"               # conservative | balanced | aggressive
min_confidence_to_act = 0.55
clarify_threshold = 0.40
require_plan_for_complex_tasks = true
require_evidence_for_completion = true
max_tool_rounds = 10

# ── Hardware Orchestrator ───────────────────────────────────────────
# Manages llama-server lifecycle and dynamic GPU layer offloading.
[orchestrator]
enabled = true
poll_interval_secs = 2
yield_threshold_mb = 512                     # Free VRAM (MB) below → yield swap
emergency_threshold_mb = 128                 # Free VRAM (MB) below → emergency SIGKILL
recover_threshold_mb = 2048                  # Free VRAM (MB) above → recover layers
cooldown_secs = 60
max_transitions_per_hour = 6
min_ngl_delta = 3
min_ngl_delta_up = 6                         # Larger delta required to scale up (anti-thrash)
safety_margin_mb = 256
hysteresis_band_mb = 256                     # Deadband above yield threshold before exiting Pressured
pressure_dwell_secs = 5                      # VRAM must be below yield for this long before swap
emergency_dwell_ms = 750                     # VRAM must be below emergency for this long (blocks driver spikes)
recovery_dwell_secs = 30                     # VRAM must be above recover for this long before scale-up
state_max_dwell_secs = 300                   # Hard cap: any state older than this forces Idle resync
max_emergency_transitions_per_hour = 3       # Separate rate budget for emergency swaps
llama_server_binary = "/home/obaid/Downloads/llama.cpp/build/bin/llama-server"
flash_attention = true
mlock = true
batch_size = 256
graceful_stop_timeout_secs = 5               # Graceful stop wait before kill escalation
health_check_timeout_secs = 120              # Spawn readiness timeout (/health)
port_discovery_timeout_secs = 60             # Ephemeral port discovery timeout
vram_release_timeout_secs = 5                # GPU release confirmation budget (seconds)
restart_cooldown_secs = 10                   # Min cooldown between auto-restarts
restart_backoff_ms = 350                     # Retry backoff before fallback spawn
idle_release_enabled = true                  # Release local llama-server when idle
idle_release_after_secs = 300                # Idle window before GPU/runtime release
idle_release_check_interval_secs = 10        # Idle watchdog polling interval
macos_yield_ram_mb = 2048
macos_emergency_ram_mb = 1024
macos_recover_ram_mb = 4096

[orchestrator.model_profile]
total_layers = 28                            # Qwen2.5-VL-7B (qwen2vl.block_count = 28)
per_layer_vram_mb = 165                      # ~4609 MiB / 28 layers
base_vram_overhead_mb = 200
kv_per_1k_ctx_mb = 100
min_context = 2048                           # Hard floor — never go below
max_context = 8192
has_vision_projector = true
mmproj_vram_mb = 1300                        # mmproj-F16.gguf ~1291 MiB

# ── Colab Cloud Tier ────────────────────────────────────────────────
[colab]
enabled = false
mcp_server_name = "colab-mcp"               # Official Colab MCP server name (uvx git+https://github.com/googlecolab/colab-mcp)
connect_timeout_secs = 60
keepalive_interval_secs = 120
checkpoint_interval_secs = 300
auto_escalate = true
fallback_to_local = true

# ── Semantic Routing ────────────────────────────────────────────────
[routing]
# Embedding model used for semantic domain routing.
# multilingual-e5-small: ~120 MB, strong Hinglish support.
# bge-small-en-v1.5: ~30 MB, English-only.
embedding_model = "multilingual-e5-small"

# Cache directory for embeddings (relative to ~/.kria).
cache_dir = "cache/router"

# Whether to use grammar-constrained decoding (llguidance / json_schema).
# Requires llama.cpp build with llguidance support (mainline since 2025).
grammar_enabled = true

# OOD detection: z-score below this → similarity is low relative to OOD baseline.
# The test is relative — no need to tune per embedding model.
ood_z_threshold = 0.5

# OOD detection: entropy fraction of H_max above this → too diffuse to be tool-directed.
ood_entropy_threshold = 0.85

# Multi-intent detection: margin below this triggers soft multi-domain check.
multi_intent_margin = 0.04

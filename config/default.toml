# ==========================================
# K.R.I.A. Default Configuration
# ==========================================
# Copy to ~/.kria/config.toml and customize.

[llm]
mode = "local"                              # "local" | "gemini" | "external"
# cloud_api_key = ""                        # Set via KRIA_CLOUD_API_KEY env var
local_host = "127.0.0.1"
local_port = 8080
max_context_tokens = 4096

[[llm.models]]
name = "qwen2.5-vl-7b"
file = "Qwen2.5-VL-7B-Instruct-Q4_K_M.gguf"
display_name = "Qwen 2.5 VL 7B (Q4_K_M)"
context_window = 8192
max_tokens = 4096
vram_estimate_gb = 5.0
capabilities = ["chat", "vision"]
mmproj_file = "mmproj-F16.gguf"

[[llm.models]]
name = "phi-4-mini"
file = "microsoft_Phi-4-mini-instruct-Q4_K_M.gguf"
display_name = "Phi-4 Mini Instruct (Q4_K_M)"
context_window = 4096
max_tokens = 2048
vram_estimate_gb = 2.5
capabilities = ["chat"]

[voice]
enabled = true
mode = "push_to_talk"
# v1 (CLI) cold-loads whisper on every utterance, so smaller = lower latency.
# v2 (in-process, when wired) keeps the model warm and handles larger variants.
# Multilingual small model (~181 MB) — fast cold-load, supports Hindi/Hinglish.
# Run: python scripts/download_models.py --tier lite to fetch it.
stt_model = "ggml-small-q5_1.bin"
tts_voice = "en_US-ljspeech-high"
vad_silence_ms = 500
energy_threshold = 0.02
mic_device = "auto"
speaker_device = "auto"
push_to_talk_key = "ctrl+space"
language = "auto"
partial_update_ms = 2000
# Live partial transcripts spawn extra whisper-cpp subprocesses; with the v1 CLI
# backend they cold-load the model on every interval and cause STT timeouts.
# Keep disabled until a persistent STT backend is wired in.
enable_partial_transcripts = false
confidence_threshold = 0.30
noise_suppression_mode = "off"
follow_system_default_mic = true
follow_system_default_speaker = true
persist_transcripts = true
persist_raw_audio = false

# Voice pipeline engine: "v1" = legacy CLI-subprocess, "v2" = in-process
# streaming (whisper-rs + piper-rs + barge-in + optional AEC). v1 stays the
# default until v2 is validated on every tier and platform.
engine = "v2"
# Hardware tier override: "auto" | "s" | "a" | "c". `auto` derives from the
# detected HardwareTier at startup.
tier = "auto"
# Engine overrides; "auto" defers to the resolved tier.
stt_engine = "auto"
tts_engine = "auto"

[voice.wake_word]
# Phase 4: openWakeWord-based "Hey Ria" activation. Disabled until the
# generic model has been downloaded via scripts/download_models.py.
enabled = false
model_path = "models/wake/hey_ria.onnx"
sensitivity = 0.5
aliases = ["hey ria", "hey riya", "hello ria", "hello riya"]

[voice.aec]
# Phase 3: WebRTC APM acoustic echo cancellation. Strictly opt-in via the
# `aec` cargo feature on `kria-voice` (adds clang+cmake build deps). With
# the feature compiled out, this section is accepted for forward
# compatibility but ignored.
enabled = false
aggressiveness = "medium"   # low | medium | high

[voice.barge_in]
# Phase 2: hard interrupt of TTS playback when the user starts speaking.
# `min_speech_ms` debounces AEC residue and single-cough false positives.
enabled = true
min_speech_ms = 180

[voice.post_edit]
# Phase 5: LLM Hinglish fix-pass over the final transcript. Runs
# concurrently with intent routing so it does not add user-perceived latency
# when within budget. Per-tier hard timeout: S=250 ms, A=600 ms, C=1000 ms.
enabled = true
model = "qwen2.5-3b-instruct"
mode = "on_low_confidence"   # always | on_low_confidence
timeout_ms = 0               # 0 = use tier default


[memory]
max_facts = 10000
decay_half_life_days = 7
prune_threshold = 0.01

[safety]
require_approval_for_red = true
audit_enabled = true
max_rollback_snapshots = 50
rollback_max_age_days = 30

[server]
host = "127.0.0.1"
port = 3001

[telegram]
enabled = false
bot_token = ""
allowed_chat_ids = ""
auto_start = true

[ui]
theme = "dark"
font_size = 14

[search]
engine = "duckduckgo"                       # "duckduckgo" | "searxng"
# searxng_url = "http://localhost:8888"     # Only used when engine = "searxng"
news_feeds = [
    "https://feeds.arstechnica.com/arstechnica/index",
    "https://hnrss.org/frontpage",
]

[hardware]
tier = ""                                   # "" = auto-detect; or lite|standard|performance|high
max_context_tokens = 0                       # 0 = tier default/clamp
gpu_layers = -1                              # -1 = tier default
threads = 0                                  # 0 = tier default

[agent]
autonomy_profile = "balanced"               # conservative | balanced | aggressive
min_confidence_to_act = 0.55
clarify_threshold = 0.40
require_plan_for_complex_tasks = true
require_evidence_for_completion = true
max_tool_rounds = 10

# ── Hardware Orchestrator ───────────────────────────────────────────
# Manages llama-server lifecycle and dynamic GPU layer offloading.
[orchestrator]
enabled = true
poll_interval_secs = 2
yield_threshold_mb = 512                     # Free VRAM (MB) below → yield swap
emergency_threshold_mb = 128                 # Free VRAM (MB) below → emergency SIGKILL
recover_threshold_mb = 2048                  # Free VRAM (MB) above → recover layers
cooldown_secs = 60
max_transitions_per_hour = 6
min_ngl_delta = 3
min_ngl_delta_up = 6                         # Larger delta required to scale up (anti-thrash)
safety_margin_mb = 256
hysteresis_band_mb = 256                     # Deadband above yield threshold before exiting Pressured
pressure_dwell_secs = 5                      # VRAM must be below yield for this long before swap
emergency_dwell_ms = 750                     # VRAM must be below emergency for this long (blocks driver spikes)
recovery_dwell_secs = 30                     # VRAM must be above recover for this long before scale-up
state_max_dwell_secs = 300                   # Hard cap: any state older than this forces Idle resync
max_emergency_transitions_per_hour = 3       # Separate rate budget for emergency swaps
llama_server_binary = "llama-server"          # Resolved via PATH; absolute paths still work
slot_save_path = ""                           # Dir passed to llama-server's --slot-save-path; "" => <tmp>/kria_llama_slots. Required for Tier B KV-cache hand-off across hard restarts.
flash_attention = false                       # Off by default; tune_for_tier opts in on Performance/High GPUs
mlock = false                                 # Off by default; tune_for_tier opts in only when free RAM is sufficient (prevents freeze)
batch_size = 128
graceful_stop_timeout_secs = 5               # Graceful stop wait before kill escalation
health_check_timeout_secs = 120              # Spawn readiness timeout (/health)
port_discovery_timeout_secs = 60             # Ephemeral port discovery timeout
vram_release_timeout_secs = 5                # GPU release confirmation budget (seconds)
restart_cooldown_secs = 10                   # Min cooldown between auto-restarts
restart_backoff_ms = 350                     # Retry backoff before fallback spawn
idle_release_enabled = true                  # Release local llama-server when idle
idle_release_after_secs = 300                # Idle window before GPU/runtime release
idle_release_check_interval_secs = 10        # Idle watchdog polling interval
macos_yield_ram_mb = 2048
macos_emergency_ram_mb = 1024
macos_recover_ram_mb = 4096

[orchestrator.model_profile]
total_layers = 28                            # Qwen2.5-VL-7B (qwen2vl.block_count = 28)
per_layer_vram_mb = 165                      # ~4609 MiB / 28 layers
base_vram_overhead_mb = 200
kv_per_1k_ctx_mb = 100
min_context = 4096                           # Hard floor — never go below this (2048 is too small for any useful inference)
max_context = 8192
has_vision_projector = true
mmproj_vram_mb = 1300                        # mmproj-F16.gguf ~1291 MiB

# ── Colab Cloud Tier ────────────────────────────────────────────────
[colab]
enabled = false
mcp_server_name = "colab-mcp"               # Official Colab MCP server name (uvx git+https://github.com/googlecolab/colab-mcp)
connect_timeout_secs = 60
keepalive_interval_secs = 120
checkpoint_interval_secs = 300
auto_escalate = true
fallback_to_local = true

# ── Semantic Routing ────────────────────────────────────────────────
[routing]
# Embedding model used for semantic domain routing.
# multilingual-e5-small: ~120 MB, strong Hinglish support.
# bge-small-en-v1.5: ~30 MB, English-only.
embedding_model = "multilingual-e5-small"

# Cache directory for embeddings (relative to ~/.kria).
cache_dir = "cache/router"

# Whether to use grammar-constrained decoding (llguidance / json_schema).
# Requires llama.cpp build with llguidance support (mainline since 2025).
grammar_enabled = true

# OOD detection: z-score below this → similarity is low relative to OOD baseline.
# The test is relative — no need to tune per embedding model.
ood_z_threshold = 0.5

# OOD detection: entropy fraction of H_max above this → too diffuse to be tool-directed.
ood_entropy_threshold = 0.85

# Multi-intent detection: margin below this triggers soft multi-domain check.
multi_intent_margin = 0.04

# ── Image Generation ─────────────────────────────────────────────────────────
[image_generation]
enabled = true                               # Cloud fallback (Pollinations.ai) works with no local GPU
tier_override = "b"                          # "" = auto-detect | "s" | "a" | "b" | "c"
                                             # Set "b" on 6 GB GPUs: VRAM snapshot is taken *before* LLM eviction
                                             # so free_mb appears < 4 GB and auto-detect falls to Tier C (cloud).
                                             # "b" forces the drop-swap protocol regardless of instantaneous free VRAM.
comfy_port = 8188                            # ComfyUI headless sidecar port
comfy_venv_dir = ""                          # "" = ~/.kria/comfyui/.venv
comfy_models_dir = ""                        # "" = ~/.kria/comfyui/models
output_dir = ""                              # "" = ~/.kria/cache/images
conditioning_cache_dir = ""                  # "" = ~/.kria/cache/conditioning
conditioning_cache_max_mb = 500
idle_unload_secs = 300                       # Seconds of inactivity before ComfyUI model unload
prewarm = "auto"                             # "auto" | "always" | "never"
prewarm_delay_secs = 30                      # Delay after startup before prewarm attempt
cloud_fallback = "always"                    # "auto_offer" | "always" | "off" — always use cloud when no local GPU
pollinations_base_url = "https://image.pollinations.ai"
max_concurrent_jobs = 2
max_queued_swap_jobs = 4
health_check_timeout_secs = 180              # ComfyUI cold start: model scan + custom node import + CUDA init can take 90s+; early-exit detection fast-fails real errors
defrag_every_n_swaps = 15                    # Restart ComfySidecar after this many Tier-B swaps
default_lora_strength = 0.85
default_quality = "balanced"
sdxl_model_high = "juggernautXL_v9Lightning.safetensors"
enable_sdxl_high_profile = false
cloud_providers = ["pollinations", "hf_flux"]
local_timeout_secs = 180
hf_inference_token = ""
prompt_enhance_mode = "auto"
# Routing mode for image generation.
#   "auto"                       KRIA decides from hardware tier (C→cloud, A/B→local+cloud, S→local)
#   "local_only"                 ComfyUI sidecar only; hard-fails if no GPU detected
#   "cloud_only"                 Pollinations.ai/HF only; sidecar never starts
#   "local_with_cloud_fallback"  Local primary; cloud on any local failure
#   "cloud_with_local_fallback"  Cloud primary; local on cloud failure
# Runtime override: KRIA_IMAGE_MODE env var (e.g. KRIA_IMAGE_MODE=cloud_only)
image_mode = "auto"

# K.R.I.A. Model Configuration
# ==============================
# All model-specific variables are defined here.
# Environment variables are interpolated via ${VAR:-default} syntax.
# The core router contains zero hardcoded model names.

models:
  primary:
    endpoint: "${KRIA_LLAMA_API_URL:-http://localhost:8080}/v1"
    api_key: "no-key-required"
    model_id: "local-primary"
    display_name: "Phi-4-mini-instruct 3.8B"
    context_window: 4096
    max_tokens: 2048
    capabilities: ["text"]
    health_key: "llm"
    tool_calling: "prompt_based"
    max_iterations: 10

  secondary:
    endpoint: "${KRIA_LLAMA_SECONDARY_API_URL:-http://localhost:8085}/v1"
    api_key: "no-key-required"
    model_id: "local-secondary"
    display_name: "Qwen2.5-VL-7B-Instruct"
    context_window: 16384
    max_tokens: 2048
    capabilities: ["text", "vision"]
    health_key: "llm_secondary"
    tool_calling: "prompt_based"
    max_iterations: 10

  gemini:
    endpoint: "https://generativelanguage.googleapis.com/v1beta/openai"
    api_key: "${KRIA_GEMINI_API_KEY:-}"
    model_id: "${KRIA_GEMINI_MODEL:-gemini-2.0-flash}"
    display_name: "Gemini"
    context_window: 128000
    max_tokens: 8192
    capabilities: ["text", "vision"]
    health_key: "gemini"
    tool_calling: "native_api"
    max_iterations: 5
    rate_limit_rpm: 15

  external:
    endpoint: "${KRIA_EXTERNAL_API_URL:-}"
    api_key: "${KRIA_EXTERNAL_API_KEY:-}"
    model_id: "${KRIA_EXTERNAL_API_MODEL:-}"
    display_name: "External API"
    context_window: 32000
    max_tokens: 4096
    capabilities: ["text"]
    health_key: "external_api"
    tool_calling: "native_api"
    max_iterations: 5
    rate_limit_rpm: 60

routing:
  default_mode: "${KRIA_LLM_MODE:-auto}"
  text_model: "primary"
  vision_model: "secondary"
  planning_model: "primary"
  classification_model: "primary"
  auto_rules:
    agent_loop: "secondary"
    direct_tool: "primary"
    conversation: "primary"

vision_detection:
  image_extensions: [".png", ".jpg", ".jpeg", ".gif", ".webp", ".bmp", ".tiff"]
  base64_prefix: "data:image/"
  path_pattern: "\\.(png|jpe?g|gif|webp|bmp|tiff)$"

validation:
  max_correction_attempts: 2
  strict_schema_check: true

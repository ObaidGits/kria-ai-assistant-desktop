name: Smoke Test

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  packages: read

jobs:
  smoke-docker:
    runs-on: ubuntu-22.04
    name: Docker smoke test

    steps:
      - uses: actions/checkout@v4

      - name: Build CPU image
        run: docker compose -f docker-compose.yml -f docker-compose.cpu.yml build

      - name: Start container
        run: |
          docker compose -f docker-compose.yml -f docker-compose.cpu.yml up -d
          echo "Waiting for container to start…"
          sleep 10

      - name: Health check
        run: |
          for i in $(seq 1 12); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3001/health 2>/dev/null || echo "000")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "  Attempt $i: HTTP $HTTP_CODE — retrying in 5s…"
            sleep 5
          done
          echo "Health check failed after 60s"
          docker compose logs
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.cpu.yml down -v

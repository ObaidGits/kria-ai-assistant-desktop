server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";

    # Health endpoint for Docker healthcheck
    location /health {
        return 200 "ok";
        add_header Content-Type text/plain;
    }

    # Proxy API calls to kria-core
    location /api/ {
        proxy_pass http://kria-core:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_connect_timeout 5s;
        proxy_send_timeout 600s;
        proxy_read_timeout 600s;
        client_max_body_size 10m;

        # Return proper JSON when backend is unavailable
        proxy_intercept_errors on;
        error_page 502 503 504 = @api_unavailable;
    }

    # JSON error response when kria-core is down or restarting
    location @api_unavailable {
        default_type application/json;
        return 503 '{"detail":"Service temporarily unavailable — backend is starting or restarting.","status":"unavailable"}';
    }

    # Proxy WebSocket
    location /ws {
        proxy_pass http://kria-core:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }

    # Avoid stale cached dashboard HTML/JS after hotfixes.
    location = /index.html {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
}

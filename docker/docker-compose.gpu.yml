# K.R.I.A. GPU Override — NVIDIA CUDA acceleration
# Usage: docker compose -f docker-compose.yml -f docker-compose.gpu.yml up -d
# Requires: NVIDIA Container Toolkit installed on the host
#
# VRAM Budget (RTX 4050 6 GB):
#   Whisper large-v3-turbo : ~1.5 GB (GPU, --gpu-layers 99)
#   Phi-4-mini-instruct    : ~2.5 GB (GPU, LLAMA_GPU_LAYERS=99)
#   CUDA overhead          : ~0.5 GB
#   Total                  : ~4.5 GB / 6.0 GB  (1.5 GB headroom)

services:
  kria-brain:
    build:
      context: ./brain
      dockerfile: Dockerfile.gpu   # builds llama.cpp + whisper.cpp from source with CUDA
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_MODULE_LOADING=LAZY
      # LLM: Phi-4-mini-instruct on GPU (~2.5 GB VRAM)
      - LLAMA_BRAIN_ROLE=primary
      - LLAMA_GPU_LAYERS=99
      # STT: large-v3-turbo on GPU (~1.5 GB VRAM). Best accuracy/speed balance.
      - WHISPER_MODEL=ggml-large-v3-turbo.bin
      - WHISPER_GPU_LAYERS=99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G

# llama.cpp server configuration for K.R.I.A. — PRIMARY brain
# Used by kria-brain container (Phi-4-mini-instruct 3.8B)
# These values are passed as CLI args in entrypoint.sh

model: /models/llm/microsoft_Phi-4-mini-instruct-Q4_K_M.gguf

# Server settings
host: 0.0.0.0
port: 8080

# Inference settings
context_length: 8192
gpu_layers: 99
threads: 8
batch_size: 512
flash_attention: true
mlock: true
continuous_batching: true

# Sampling defaults (overridable per request)
temperature: 0.6
top_p: 0.9
repeat_penalty: 1.1

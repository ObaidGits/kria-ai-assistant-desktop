# GPU override — auto-loaded by Docker Compose on this machine.
# This file is NOT committed to version control; it is machine-specific.
# It ensures `docker compose up -d` always uses the NVIDIA runtime.
#
# To disable GPU (CPU-only): rename or delete this file.

services:
  kria-brain:
    build:
      context: ./brain
      dockerfile: Dockerfile.gpu
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
      - CUDA_MODULE_LOADING=LAZY
      - LLAMA_MODEL_SIZE=0.6b
      - LLAMA_GPU_LAYERS=99
      - WHISPER_MODEL=ggml-medium.en.bin
      - WHISPER_GPU_LAYERS=99
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
        limits:
          memory: 8G
